server:
  port: 8085

app:
  trello:
    api-key: ${TRELLO_API_KEY}
    api-token: ${TRELLO_API_TOKEN}
    board-id: ${TRELLO_BOARD_ID}
    poll-interval-ms: 30000
    backlog-list-name: Backlog          # Karten in dieser Liste werden analysiert (Story Points)
    refinement-label-name: Refinement   # Nur Karten mit diesem Label werden im Backlog verarbeitet
    ready-label-name: Refined            # Dieses Label wird nach der Analyse gesetzt
    story-points-field-name: Story Points  # Name des Custom Fields für Story Points
    sprint-list-name: Sprint               # Karten in dieser Liste werden implementiert
    bugs-list-name: Bugs                   # Karten in dieser Liste werden direkt (höher priorisiert) implementiert
    qa-list-name: QA                       # Karte wird nach erfolgreicher Implementierung hierher verschoben
    base-url: https://api.trello.com/1

  claude-code:
    repo-path: ${CLAUDE_CODE_REPO_PATH:D:/git/FM-Backend}   # Arbeitsverzeichnis für Claude Code CLI
    repos:                                                    # alle Repos des Projektverbunds
      - name: FM-Backend
        path: ${FM_BACKEND_PATH:D:/git/FM-Backend}
      - name: FM-Desktop
        path: ${FM_DESKTOP_PATH:D:/git/FM-Desktop}
      - name: FM-Editor
        path: ${FM_EDITOR_PATH:D:/git/FM-Editor}
    context-file: ${CLAUDE_CODE_CONTEXT_FILE:}   # Fallback: einzelne Kontext-Datei (wenn keine repos konfiguriert)
    timeout-minutes: 30                           # maximale Laufzeit pro Claude-Code-Aufruf
    max-retries: 5                                # maximale Wiederholungsversuche bei unvollständigem Ergebnis
    rate-limit-wait-minutes: 240                  # Wartezeit nach Token-Erschöpfung (4 Stunden)

logging:
  level:
    com.example.trelloclaudebot: DEBUG
  file:
    name: ${LOG_FILE:logs/trello-claude-bot.log}   # Pfad konfigurierbar per Env-Variable LOG_FILE
  logback:
    rollingpolicy:
      max-file-size: 10MB          # neue Datei nach 10 MB
      max-history: 14              # Logs der letzten 14 Tage behalten
      file-name-pattern: ${LOG_FILE:logs/trello-claude-bot}.%d{yyyy-MM-dd}.%i.log
